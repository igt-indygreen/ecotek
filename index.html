<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            min-height: 20px;
        }

        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }

        .map-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            height: 400px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .tracks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .track-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .track-card:hover {
            transform: translateY(-5px);
        }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .timestamp {
            font-size: 0.9em;
            color: #666;
        }

        .coords {
            font-family: monospace;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        .accuracy {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .tracks { grid-template-columns: 1fr; }
            .btn { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Mobile Tracker</h1>
            <p>Real-time location tracking with browser geolocation</p>
        </div>

        <div class="controls">
            <button id="startTracking" class="btn">Start Tracking</button>
            <button id="stopTracking" class="btn" disabled>Stop Tracking</button>
            <button id="clearTracks" class="btn">Clear Tracks</button>
            <div id="status" class="status"></div>
        </div>

        <div class="map-container">
            <div id="map">Map will appear here (requires Leaflet CDN or static map)</div>
        </div>

        <div id="tracks" class="tracks"></div>
    </div>

    <!-- Leaflet CSS and JS for interactive maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        class MobileTracker {
            constructor() {
                this.map = null;
                this.tracking = false;
                this.watchId = null;
                this.tracks = [];
                this.markers = [];
                this.initMap();
                this.bindEvents();
            }

            initMap() {
                this.map = L.map('map').setView([0, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(this.map);
            }

            bindEvents() {
                document.getElementById('startTracking').addEventListener('click', () => this.start());
                document.getElementById('stopTracking').addEventListener('click', () => this.stop());
                document.getElementById('clearTracks').addEventListener('click', () => this.clear());
            }

            async start() {
                if (!navigator.geolocation) {
                    this.showStatus('Geolocation is not supported by this browser.', 'error');
                    return;
                }

                this.showStatus('Requesting location access...', 'loading');
                this.tracking = true;

                this.watchId = navigator.geolocation.watchPosition(
                    (position) => this.onLocationUpdate(position),
                    (error) => this.onLocationError(error),
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 60000
                    }
                );

                this.updateButtons();
            }

            stop() {
                if (this.watchId) {
                    navigator.geolocation.clearWatch(this.watchId);
                    this.watchId = null;
                }
                this.tracking = false;
                this.updateButtons();
                this.showStatus('Tracking stopped', 'success');
            }

            clear() {
                this.tracks = [];
                this.markers.forEach(marker => this.map.removeLayer(marker));
                this.markers = [];
                document.getElementById('tracks').innerHTML = '';
                this.showStatus('Tracks cleared', 'success');
            }

            onLocationUpdate(position) {
                const { latitude, longitude, accuracy } = position.coords;
                const track = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleString(),
                    latitude,
                    longitude,
                    accuracy
                };

                this.tracks.unshift(track);
                this.addToMap(track);
                this.addToList(track);
                this.fitMapBounds();

                this.showStatus(`New location: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`, 'success');
            }

            onLocationError(error) {
                let message = 'Location error: ';
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        message += "User denied the request";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        message += "Location information unavailable";
                        break;
                    case error.TIMEOUT:
                        message += "Request timeout";
                        break;
                    default:
                        message += "Unknown error";
                }
                this.showStatus(message, 'error');
            }

            addToMap(track) {
                const marker = L.marker([track.latitude, track.longitude])
                    .addTo(this.map)
                    .bindPopup(`
                        <b>Lat: ${track.latitude.toFixed(6)}</b><br>
                        <b>Lng: ${track.longitude.toFixed(6)}</b><br>
                        <small>${track.timestamp}</small>
                    `);

                this.markers.push(marker);
            }

            addToList(track) {
                const trackCard = document.createElement('div');
                trackCard.className = 'track-card';
                trackCard.innerHTML = `
                    <div class="track-header">
                        <strong>📍 New Location</strong>
                        <span class="timestamp">${track.timestamp}</span>
                    </div>
                    <div class="coords">
                        Lat: ${track.latitude.toFixed(6)}<br>
                        Lng: ${track.longitude.toFixed(6)}
                    </div>
                    <div class="accuracy">Accuracy: ${track.accuracy.toFixed(0)}m</div>
                `;
                document.getElementById('tracks').prepend(trackCard);

                // Keep only last 50 tracks
                if (this.tracks.length > 50) {
                    document.getElementById('tracks').removeChild(document.getElementById('tracks').lastElementChild);
                }
            }

            fitMapBounds() {
                if (this.markers.length > 1) {
                    const group = new L.featureGroup(this.markers);
                    this.map.fitBounds(group.getBounds(), { padding: [20, 20] });
                } else if (this.markers.length === 1) {
                    this.map.setView(this.markers[0].getLatLng(), 15);
                }
            }

            updateButtons() {
                document.getElementById('startTracking').disabled = this.tracking;
                document.getElementById('stopTracking').disabled = !this.tracking;
            }

            showStatus(message, type) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = message;
                statusEl.className = `status ${type}`;
            }
        }

        // Initialize tracker when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new MobileTracker();
        });
    </script>
</body>
</html>
